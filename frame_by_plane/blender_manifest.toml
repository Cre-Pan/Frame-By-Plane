schema_version = "1.0.0"

id = "frame_by_plane"
version = "5.8.6"
name = "Frame By Plane"
tagline = "A better Image as Planes workflow for animation"
maintainer = "Alessandro Pannoli <pannoli312@gmail.com>"
type = "add-on"

tags = ["3D View", "Animation"]
platforms = [
  "windows-x64",
  "windows-arm64",
  "macos-x64",
  "macos-arm64",
  "linux-x64",
]
blender_version_min = "5.1.2"

license = [
  "SPDX:GPL-3.0-or-later",
]

copyright = [
  "2026 Alessandro Pannoli",
]

[permissions]
files = "Import media, rename sequences, and save rendered frames"
clipboard = "Import images and media paths from the clipboard"

[build]
paths_exclude_pattern = [
  "README.md",
  "__pycache__/",
  ".*",
  "*.zip",
  "*.blend1",
  "*.bak",
  "_fbp_update_backups/",
  "RELEASE_NOTES_*.md",
  "CHANGELOG*.md",
  "AUDIT_REPORT*.md",
  "ARCHITECTURE_*.md",
  "EFFECT_ICONS.md",
  "PRESETS_AND_SETTINGS.md",
  "ROADMAP_STATUS.md",
  "KNOWN_LIMITATIONS.md",
  "LTS_TEST_REPORT.md",
  "tests/",
  "*.sha256",
  "*.log",
  "*.diff",
]
