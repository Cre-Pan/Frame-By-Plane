schema_version = "1.0.0"

id = "frame_by_plane"
version = "4.8.7"
name = "Frame by Plane"
tagline = "Rigged image planes for multiplane animation"
maintainer = "Alessandro Pannoli <pannoli312@gmail.com>"
type = "add-on"

tags = ["3D View", "Animation"]
blender_version_min = "5.1.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

copyright = [
  "2026 Alessandro Pannoli",
]

[permissions]
files = "Import media, rename sequences, and save rendered frames"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".*",
  "*.zip",
  "*.blend1",
  "*.bak",
  "_fbp_update_backups/",
  "RELEASE_NOTES_*.md",
  "CHANGELOG*.md",
  "AUDIT_REPORT*.md",
]
